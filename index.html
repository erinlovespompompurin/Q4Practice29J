<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Switch Statement</h1>

    <button type="btn btn-sucess" onclick="teamRank()">Rank</button>
     <script>
    
    let team = "Green";

    switch (team){
        case "Green" :
            alert("Go Green Hornets!");
            break;

        case "Blue" :
            alert ("Go Blue Bears!");
            break;

        case "Red" :
            alert ("Go Red Bulldogs!")
            break;

        case "Yellow" :
            alert ("Go Yellow Tigers!")
            break;
        
        default: 
            alert("No Team Found")

    }

    function teamRank(){
        let rank = "1st";

        switch (rank){
            case "1st" :
                message = "Champion!"
                break;

            case "2nd" : 
                message = "2nd Place!"
                break;

            case "3rd" :
                message = "3rd place!"
                break;

             case "4th" :
                message = "4th Place!"
                break;

            default: 
                message = "Ranking could not be determined" ;

         }

            alert(message);
    }


    </script>

</body>
</html>
